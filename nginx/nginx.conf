user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 15M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP → HTTPS 리디렉션
    server {
        listen 80;
        server_name cheonghwa-farm.com www.cheonghwa-farm.com admin.cheonghwa-farm.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 메인 쇼핑몰 (cheonghwa-farm.com)
    server {
        listen 443 ssl;
        server_name cheonghwa-farm.com www.cheonghwa-farm.com;
        http2 on;

        ssl_certificate     /etc/letsencrypt/live/cheonghwa-farm.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cheonghwa-farm.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /var/www/frontend;
        index index.html;

        # API 프록시
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # 관리자 페이지 (admin.cheonghwa-farm.com)
    server {
        listen 443 ssl;
        server_name admin.cheonghwa-farm.com;
        http2 on;

        ssl_certificate     /etc/letsencrypt/live/cheonghwa-farm.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cheonghwa-farm.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /var/www/admin;
        index index.html;

        # API 프록시
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
